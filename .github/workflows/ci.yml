# ci.yml
#
# Continuous Integration pipeline for @nexcode/editor.
#
# Triggers:
# - Every push to main or develop branches
# - Every pull request targeting main
#
# Jobs:
# 1. lint     — ESLint + Prettier format check
# 2. typecheck — TypeScript strict type checking
# 3. test     — Vitest unit tests with coverage
# 4. build    — tsup dual ESM/CJS build
# 5. e2e      — Playwright browser tests (runs after build)
#
# All jobs run in parallel except e2e which depends on build.
# A PR cannot be merged unless all jobs pass.

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same branch when a new push arrives.
# Saves CI minutes and prevents stale results from blocking merges.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Node version used across all jobs — must match engines.node in package.json
  NODE_VERSION: '20'

jobs:

  # ── Job: Lint ──────────────────────────────────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Cache npm dependencies — speeds up subsequent runs significantly
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --workspace=packages/core

      - name: Check Prettier formatting
        run: npm run format:check

  # ── Job: Type check ────────────────────────────────────────────────────────

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck --workspace=packages/core

  # ── Job: Unit Tests ────────────────────────────────────────────────────────

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage --workspace=packages/core

      - name: Upload coverage report
        # Upload coverage even if tests fail — helps diagnose what broke
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/core/coverage/
          retention-days: 14

      # Enforce coverage thresholds are met.
      # The thresholds are configured in vitest.config.ts —
      # this step just makes the failure visible in CI.
      - name: Check coverage thresholds
        run: |
          echo "Coverage thresholds are enforced by vitest config."
          echo "If tests passed, thresholds were met."

  # ── Job: Build ─────────────────────────────────────────────────────────────

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --workspace=packages/core
        env:
          NODE_ENV: production

      - name: Verify build outputs exist
        run: |
          # Verify the expected build artifacts are present
          echo "Checking build outputs..."

          # ESM output
          test -f packages/core/dist/index.js || \
            (echo "ERROR: ESM output missing: dist/index.js" && exit 1)

          # CJS output
          test -f packages/core/dist/index.cjs || \
            (echo "ERROR: CJS output missing: dist/index.cjs" && exit 1)

          # TypeScript declarations
          test -f packages/core/dist/index.d.ts || \
            (echo "ERROR: Type declarations missing: dist/index.d.ts" && exit 1)

          # CSS styles
          test -f packages/core/dist/styles/base.css || \
            (echo "ERROR: CSS missing: dist/styles/base.css" && exit 1)

          test -f packages/core/dist/styles/theme-light.css || \
            (echo "ERROR: CSS missing: dist/styles/theme-light.css" && exit 1)

          test -f packages/core/dist/styles/theme-dark.css || \
            (echo "ERROR: CSS missing: dist/styles/theme-dark.css" && exit 1)

          echo "All build outputs verified."

      - name: Check bundle size
        run: |
          # Report bundle sizes — not a blocking check, just informational
          echo "=== Bundle sizes ==="
          ls -lh packages/core/dist/*.js packages/core/dist/*.cjs 2>/dev/null || true
          echo "=== CSS sizes ==="
          ls -lh packages/core/dist/styles/*.css 2>/dev/null || true

      # Upload the build artifact so the E2E job can use it
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: packages/core/dist/
          retention-days: 1

  # ── Job: E2E Tests ─────────────────────────────────────────────────────────

  e2e:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # E2E tests require the package to be built first
    needs: build

    strategy:
      # Run all browser variants even if one fails —
      # a failure in Firefox should not hide a Webkit failure
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: packages/core/dist/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}
        working-directory: packages/core
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: packages/core/playwright-report/
          retention-days: 7

      - name: Upload test screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-${{ matrix.browser }}
          path: packages/core/test-results/
          retention-days: 7