# changeset.yml
#
# Changeset automation workflow.
#
# When changeset files are merged to main, this workflow:
# 1. Detects pending changesets
# 2. Opens a "Version Packages" PR that:
#    - Bumps package versions according to changeset semver intent
#    - Updates CHANGELOG.md with release notes
#    - Removes the consumed changeset files
#
# When that "Version Packages" PR is merged:
# - The publish.yml workflow fires and publishes to npm
#
# This creates a clean, auditable release process:
#   feature branch → main (changeset files merge)
#     → "Version Packages" PR opens automatically
#       → PR is reviewed and merged
#         → Package published to npm

name: Changeset Release

on:
  push:
    branches:
      - main

concurrency:
  group: changeset-release
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:

  release:
    name: Create or Update Release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Fetch all history so changesets can detect what changed
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Create or update Release PR
        uses: changesets/action@v1
        with:
          # The title of the version bump PR
          title: 'chore: release @nexcode/editor'

          # Commit message used when changesets bumps versions
          commit: 'chore: version packages'

          # When this PR is merged, run the publish workflow
          # (publish.yml handles the actual npm publish)
          publish: echo "Publish handled by publish.yml"

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}