<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="@nexcode/editor — development playground" />
    <title>NexEditor Playground</title>
    <style>
      /* Minimal page reset — not part of the editor */
      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f4f4f5;
        color: #18181b;
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
      }

      /* Dark mode for the page shell */
      @media (prefers-color-scheme: dark) {
        body {
          background: #09090b;
          color: #fafafa;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
